<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXIQUE // MAINLINE STOREFRONT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PATH 3: AUTOMATED BANNER BROADCAST CORE -->
    <div id="dynamicPromoBanner" style="display: none;">
        <div id="promoBannerText"></div>
    </div>

    <!-- MAIN BRAND HEADER -->
    <header class="main-header">
        <div class="logo">TOXIQUE<span>//</span>HOUSE OF X</div>
        <div class="nav-controls">
            <a href="admin.html" class="nav-link">MAINFRAME</a>
            <div class="cart-trigger" onclick="toggleCartDrawer()">BAG (<span id="cartCountGlobal">0</span>)</div>
        </div>
    </header>

    <!-- PATH 3: CATEGORY NAV ROUTERS -->
    <nav class="category-nav">
        <button class="nav-filter active" onclick="filterStorefrontCatalog('all')">ALL COLLECTIONS</button>
        <button class="nav-filter" onclick="filterStorefrontCatalog('garments')">GARMENTS</button>
        <button class="nav-filter" onclick="filterStorefrontCatalog('cosmetics')">BEAUTY LABS</button>
        <button class="nav-filter" onclick="filterStorefrontCatalog('fragrance')">FRAGRANCE</button>
        <button class="nav-filter" onclick="filterStorefrontCatalog('xxx')">RESTRICTED XXX</button>
    </nav>

    <!-- PATH 3: MAIN HIGH-FASHION DYNAMIC STAGING GRID -->
    <main class="storefront-container">
        <div id="storefrontGrid" class="catalog-grid">
            <!-- Dynamic product cards render here via script.js -->
        </div>
    </main>

    <!-- SHOPPING BAG SIDE DRAWER -->
    <div id="cartDrawer" class="cart-drawer">
        <div class="drawer-header">
            <h3>YOUR SELECTIONS</h3>
            <button class="close-drawer-btn" onclick="toggleCartDrawer()">CLOSE</button>
        </div>
        <div id="drawerCartItems" class="drawer-items-container">
            <!-- Staged items manifest here dynamically -->
        </div>
        <div class="drawer-footer">
            <div class="drawer-subtotal-line">
                <span>ESTIMATED UNIT TOTAL:</span>
                <strong id="drawerSubtotalAmount">$0.00</strong>
            </div>
            <button id="checkoutBtn" class="checkout-action-btn">COMPILE ACQUISITION INVOICE</button>
        </div>
    </div>
    <div id="drawerOverlay" class="drawer-overlay" onclick="toggleCartDrawer()"></div>

    <!-- PATH 2: HIGH-FASHION CUSTOMER INVOICE PROCESSING OVERLAY MODAL -->
    <div id="invoiceModalOverlay" style="display: none;">
        <div class="invoice-box-frame">
            <div class="invoice-header">
                <h2>ACQUISITION RECORD INVOICE</h2>
                <div class="invoice-meta-line">DATE STAMP: <span id="invoiceDateStamp">00/00/0000</span></div>
            </div>
            
            <div id="invoiceManifestItems" class="invoice-manifest-lines">
                <!-- Row strings populate here dynamically -->
            </div>

            <div class="invoice-accounting-ledger">
                <div class="ledger-row">
                    <span>UNIT ASSETS SUBTOTAL:</span>
                    <span id="invoiceSubtotal">$0.00</span>
                </div>
                <div class="ledger-row" id="invoiceDiscountRow" style="display: none;">
                    <span id="invoiceDiscountLabel">CAMPAIGN DEDUCTION:</span>
                    <span id="invoiceDiscountAmount">-$0.00</span>
                </div>
                <div class="ledger-row">
                    <span>LOGISTICS HANDLING FLAT FEE:</span>
                    <span id="invoiceShipping">$650</span>
                </div>
                <div class="ledger-row total-row">
                    <span>TOTAL GROSS PAYLOAD:</span>
                    <span id="invoiceGrandTotal">$0.00</span>
                </div>
            </div>

            <div class="invoice-action-footer">
                <button class="invoice-btn authorize" onclick="executeFinalTransaction()">AUTHORIZE SECURE TRANSACTIONS</button>
                <button class="invoice-btn cancel" onclick="closeInvoiceStage()">ABORT INVOICE CONNECTION</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
