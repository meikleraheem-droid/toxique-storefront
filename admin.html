<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXIQUE // COUTURES MAINFRAME</title>
    <style>
        :root {
            --bg-deep: #0a0512; --bg-surface: #140d24; --lux-gold: #d4af37; --neon-purple: #7821ef; --text-main: #f5f2fa; --text-muted: #968fa3;
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: monospace; padding: 2rem; margin: 0; }
        .header { border-bottom: 1px solid var(--lux-gold); padding-bottom: 1.5rem; margin-bottom: 2.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 2rem; font-weight: bold; letter-spacing: 4px; }
        .logo span { color: var(--lux-gold); }
        .return-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); padding: 0.5rem 1rem; text-decoration: none; font-size: 0.8rem; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .metric-card { background: var(--bg-surface); border: 1px solid var(--neon-purple); padding: 1.5rem; position: relative; }
        .metric-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--lux-gold); }
        .metric-label { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem; }
        .metric-value { font-size: 1.8rem; font-weight: bold; }
        .workspace-layout { display: grid; grid-template-columns: 1fr; gap: 3rem; margin-bottom: 4rem; }
        @media (min-width: 992px) { .workspace-layout { grid-template-columns: 380px 1fr; } }
        .form-vault { background: var(--bg-surface); border: 1px solid var(--neon-purple); padding: 2rem; margin-bottom: 2rem; }
        .form-vault h2 { margin-top: 0; color: var(--lux-gold); font-size: 1.2rem; letter-spacing: 2px; border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom: 0.75rem; }
        .input-group { margin-bottom: 1.25rem; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem; }
        .input-group input, .input-group select { width: 100%; background: #0d071a; border: 1px solid rgba(120,33,239,0.5); padding: 0.75rem; color: var(--text-main); font-family: monospace; box-sizing: border-box; }
        .compile-btn { width: 100%; background: var(--neon-purple); color: var(--text-main); border: 1px solid var(--lux-gold); padding: 1rem; font-family: monospace; font-weight: bold; cursor: pointer; }
        .matrix-table { width: 100%; border-collapse: collapse; background: var(--bg-surface); border: 1px solid var(--neon-purple); }
        .matrix-table th, .matrix-table td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(212,175,55,0.1); }
        .matrix-table th { color: var(--lux-gold); background: rgba(120,33,239,0.2); font-size: 0.8rem; }
        .action-row-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); padding: 0.25rem 0.6rem; cursor: pointer; font-family: monospace; }
        .action-row-btn.wipe:hover { border-color: #ff3e3e; color: #ff3e3e; }

        /* PATH 1: VAULT OVERLAY STYLES */
        .security-gate-vault { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #06030b; z-index: 99999; display: flex; justify-content: center; align-items: center; padding: 1.5rem; box-sizing: border-box; }
        .security-card { background: #110a1f; border: 1px solid #ff3e3e; box-shadow: 0 0 40px rgba(255, 62, 62, 0.15); width: 100%; max-width: 420px; padding: 3rem; text-align: center; font-family: monospace; }
        .security-card h2 { color: #f5f2fa; letter-spacing: 4px; font-size: 1.5rem; margin-top: 0; }
        .security-card h2 span { color: #ff3e3e; }
        .security-input-group { margin-bottom: 1.5rem; }
        .security-input-group input { width: 100%; background: #07040d; border: 1px solid rgba(255, 62, 62, 0.3); padding: 0.9rem; color: #f5f2fa; font-family: monospace; text-align: center; letter-spacing: 4px; font-size: 1.1rem; box-sizing: border-box; }
        .security-gate-btn { width: 100%; background: transparent; color: #ff3e3e; border: 1px solid #ff3e3e; padding: 0.9rem; font-family: monospace; font-weight: bold; cursor: pointer; }
        .security-gate-btn:hover { background: #ff3e3e; color: #06030b; }
    </style>
</head>
<body>

    <!-- PATH 1: LOCK SCREEN ENVELOPE GATEWAY -->
    <div id="mainframeSecurityGate" class="security-gate-vault">
        <div class="security-card">
            <h2>ACCESS RESTRICTED<span>XXX</span></h2>
            <p style="color:#968fa3; font-size:0.75rem; text-transform:uppercase; margin-bottom:2rem;">Toxique Back-Office Decryption Node</p>
            <div class="security-input-group">
                <input type="password" id="gatePasscodeField" placeholder="••••••••" onkeydown="handleGateKeypress(event)">
            </div>
            <button class="security-gate-btn" onclick="verifyMainframeCredentials()">AUTHORIZE DECRYPTION KEY</button>
            <br><a href="index.html" style="display:inline-block; margin-top:1.5rem; color:#968fa3; font-size:0.7rem; text-decoration:none;">&lt;&lt; ABORT & RETURN</a>
        </div>
    </div>

    <div class="header">
        <div class="logo">TOXIQUE<span>.</span> MAINFRAME</div>
        <a href="index.html" class="return-btn">&lt;&lt; STOREFRONT CHANNEL</a>
    </div>

    <div class="metrics-grid">
        <div class="metric-card"><div class="metric-label">Gross Revenue (Total)</div><div class="metric-value" id="metricGrossVolume">$0.00</div></div>
        <div class="metric-card"><div class="metric-label">Completed Shipments</div><div class="metric-value" id="metricOrdersCount">0 ASSETS</div></div>
        <div class="metric-card"><div class="metric-label">System Status</div><div class="metric-value" style="color:#7821ef;">ONLINE</div></div>
    </div>

    <div class="workspace-layout">
        <div>
            <div class="form-vault">
                <h2>LIVE BANNER TUNER</h2>
                <div class="input-group">
                    <label for="adminBannerInput">Custom Ticker Message</label>
                    <input type="text" id="adminBannerInput" placeholder="Leave empty for smart calendar mode...">
                </div>
                <button class="compile-btn" style="background: transparent; color: var(--lux-gold);" onclick="saveCustomBannerText()">UPDATE HEADER TRANSMISSION</button>
            </div>

            <!-- PATH 3: ASSET MASTER CATALOG COMPILER FORM -->
            <div class="form-vault">
                <h2 id="formHeaderTitle">ASSET COMPILER</h2>
                <form id="adminProductForm">
                    <input type="hidden" id="formItemId" value="">
                    <div class="input-group"><label for="formTitle">Asset Title</label><input type="text" id="formTitle" required></div>
                    <div class="input-group"><label for="formPrice">Price (USD)</label><input type="number" id="formPrice" step="0.01" required></div>
                    <div class="input-group"><label for="formImageSrc">Image URL</label><input type="text" id="formImageSrc" required></div>
                    <div class="input-group">
                        <label for="formCategory">Division Line</label>
                        <select id="formCategory" required>
                            <option value="garments">Garments</option><option value="cosmetics">Cosmetics</option><option value="fragrance">Fragrance</option><option value="xxx">Restricted XXX</option>
                        </select>
                    </div>
                    <div class="input-group"><label for="formTag">Sub-Brand Label</label><input type="text" id="formTag" required></div>
                    <button type="submit" class="compile-btn" id="formSubmitBtn">COMPILE TO LIVE CATALOG</button>
                </form>
            </div>
        </div>

        <div>
            <h3 style="color:var(--lux-gold); letter-spacing:2px; margin-top:0;">CATALOG MASTER REGISTRY</h3>
            <table class="matrix-table">
                <thead><tr><th>ID</th><th>Title</th><th>Division</th><th>Price</th><th>Directives</th></tr></thead>
                <tbody id="adminInventoryTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // PATH 1: AUTHENTICATION MATRIX CONTROL LOGIC
        const MAINFRAME_ACCESS_KEY = "TOXIQUE2026"; 
        function verifyMainframeCredentials() {
            const val = document.getElementById("gatePasscodeField").value;
            if (val === MAINFRAME_ACCESS_KEY) {
                document.getElementById("mainframeSecurityGate").style.setProperty("display", "none", "important");
                sessionStorage.setItem("toxique_vault_unlocked", "true");
            } else {
                alert("SECURITY EXCEPTION: ACCESS DENIED.");
                document.getElementById("gatePasscodeField").value = "";
            }
        }
        function handleGateKeypress(e) { if (e.key === "Enter") verifyMainframeCredentials(); }
        (() => { if (sessionStorage.getItem("toxique_vault_unlocked") === "true") { document.addEventListener("DOMContentLoaded", () => { document.getElementById("mainframeSecurityGate").style.setProperty("display", "none", "important"); }); } })();

        // CATALOG & DATA MANAGEMENTS
        let TOXIQUE_CATALOG = JSON.parse(localStorage.getItem("toxique_live_catalog")) || [];
        let PURCHASE_HISTORY = JSON.parse(localStorage.getItem("toxique_sales_ledger")) || [];

        document.addEventListener("DOMContentLoaded", () => {
            renderDashboardFramework();
            document.getElementById("adminBannerInput").value = localStorage.getItem("toxique_custom_banner_msg") || "";
        });

        function renderDashboardFramework() {
            populateInventoryTable();
            // Calculate mock ledger data variables
            let revenue = PURCHASE_HISTORY.reduce((sum, item) => sum + item.pricePaid, 0);
            document.getElementById("metricGrossVolume").innerText = `$${revenue.toFixed(2)}`;
            document.getElementById("metricOrdersCount").innerText = `${PURCHASE_HISTORY.length} SECURE SHIPMENTS`;
        }

        function populateInventoryTable() {
            const tbody = document.getElementById("adminInventoryTableBody");
            if(!tbody) return;
            tbody.innerHTML = TOXIQUE_CATALOG.map(item => `
                <tr>
                    <td style="color:var(--lux-gold); font-size:0.8rem;">${item.id}</td>
                    <td><strong>${item.title}</strong></td>
                    <td style="text-transform:uppercase; font-size:0.8rem; color:var(--text-muted);">${item.category}</td>
                    <td>$${parseFloat(item.price).toFixed(2)}</td>
                    <td><button class="action-row-btn wipe" onclick="deleteAssetRecord('${item.id}')">WIPE</button></td>
                </tr>
            `).join('');
        }

        window.saveCustomBannerText = () => {
            localStorage.setItem("toxique_custom_banner_msg", document.getElementById("adminBannerInput").value.trim());
            alert("BANNER METRICS OVERRIDDEN SUCCESSFULLY.");
        };

        document.getElementById("adminProductForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const pPrice = parseFloat(document.getElementById("formPrice").value);
            const newItem = {
                id: "tx-custom-" + Math.floor(Math.random() * 10000),
                category: document.getElementById("formCategory").value,
                tag: document.getElementById("formTag").value,
                title: document.getElementById("formTitle").value,
                price: pPrice,
                img: document.getElementById("formImageSrc").value
            };
            TOXIQUE_CATALOG.push(newItem);
            localStorage.setItem("toxique_live_catalog", JSON.stringify(TOXIQUE_CATALOG));
            document.getElementById("adminProductForm").reset();
            renderDashboardFramework();
            alert("ASSET SYNCHRONIZED TO LIVE CATALOG ARRAY.");
        });

        window.deleteAssetRecord = (itemId) => {
            if (confirm("CONFIPE ASSET RECORD FROM LEDGER?")) {
                TOXIQUE_CATALOG = TOXIQUE_CATALOG.filter(i => i.id !== itemId);
                localStorage.setItem("toxique_live_catalog", JSON.stringify(TOXIQUE_CATALOG));
                renderDashboardFramework();
            }
        };
    </script>
</body>
</html>
